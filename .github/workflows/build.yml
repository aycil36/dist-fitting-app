name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: |
          pip install streamlit scipy numpy pandas matplotlib openpyxl pyinstaller

      - name: Launcher script oluştur
        run: |
          echo import subprocess > launcher.py
          echo import sys >> launcher.py
          echo import os >> launcher.py
          echo import threading >> launcher.py
          echo import time >> launcher.py
          echo import webbrowser >> launcher.py
          echo. >> launcher.py
          echo def open_browser(): >> launcher.py
          echo     time.sleep(3) >> launcher.py
          echo     webbrowser.open('http://localhost:8501') >> launcher.py
          echo. >> launcher.py
          echo if __name__ == '__main__': >> launcher.py
          echo     t = threading.Thread(target=open_browser) >> launcher.py
          echo     t.start() >> launcher.py
          echo     subprocess.run([sys.executable, '-m', 'streamlit', 'run', 'app.py', '--server.headless', 'true']) >> launcher.py

      - name: EXE oluştur
        run: |
          pyinstaller --onefile --name DistFittingApp --noconsole launcher.py

      - name: EXE'yi kaydet
        uses: actions/upload-artifact@v4
        with:
          name: DistFittingApp-Windows
          path: dist/DistFittingApp.exe
