name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: |
          pip install streamlit scipy numpy pandas matplotlib openpyxl pyinstaller

      - name: EXE oluştur
        run: |
          pyinstaller --onefile --name DistFittingApp --noconsole --add-data "app.py;." launcher.py

      - name: EXE'yi kaydet
        uses: actions/upload-artifact@v4
        with:
          name: DistFittingApp-Windows
          path: dist/DistFittingApp.exe
